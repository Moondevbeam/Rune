name: Feature request
description: Suggest an improvement or new Rune Tool
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Wallet core (send/receive)
        - Rune Tools
        - Security / auth
        - UI / UX
        - Documentation
        - Other
